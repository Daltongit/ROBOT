<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Interactivo - Robot de Bola</title>
    <link rel="stylesheet" href="styles/main.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>
    <div class="simulation-dashboard">
        <aside class="left-panel">
            <h3>CONTROLES 3D</h3>
            <div class="controls-info">
                <p><strong>Mouse Izq:</strong> Rotar cámara</p>
                <p><strong>Mouse Der:</strong> Panear cámara</p>
                <p><strong>Rueda:</strong> Zoom +/-</p>
                <p style="color: #00bcd4;"><strong>Flechas / WASD:</strong> Conducir Robot</p>
                <p><strong>Menú Derecho:</strong> Clic aislar pieza</p>
                <br>
                <button class="action-btn" id="btn-reset">Ver Robot Completo</button>
                <button class="action-btn" id="btn-budget">Ver Presupuesto ($)</button>
                <button class="action-btn" id="btn-novelty">Ver Novedad (Idea)</button>
            </div>
        </aside>

        <main class="center-panel">
            <div id="scene-container"></div>
            <div id="floating-title" class="hidden">Nombre de la Pieza</div>
        </main>

        <aside class="right-panel">
            <h3>LISTA DE COMPONENTES</h3>
            <div class="explorer-content">
                <p id="info-desc">Haz clic en cualquier componente de la lista inferior para extraerlo de la esfera y examinarlo en detalle.</p>
            </div>
            <div class="component-list" id="component-list">
                </div>
        </aside>
    </div>

    <div id="overlay" class="overlay hidden">
        <div class="overlay-content">
            <button class="close-btn" id="close-overlay">&times;</button>
            <div id="overlay-body"></div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
